<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BILT+YOLO Studio{% endblock %}</title>

  <!-- Bootstrap 5 (ダークテーマ対応) -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    /* ─── レイアウト ─── */
    body        { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    #main-nav   { flex-shrink: 0; }
    #page-body  { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* ─── サイドバー共通 ─── */
    .sidebar {
      width: 280px; min-width: 280px; max-width: 280px;
      overflow-y: auto; border-right: 1px solid var(--bs-border-color);
      padding: 0.75rem;
    }

    /* ─── ステータスバッジ ─── */
    .svc-badge { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 10px; }
    .svc-ok    { background: #198754; color: #fff; }
    .svc-ng    { background: #dc3545; color: #fff; }
    .svc-wait  { background: #6c757d; color: #fff; }

    /* ─── エンジン選択タブ ─── */
    .engine-tab.active { border-bottom: 2px solid var(--bs-primary); }

    /* ─── ビデオキャンバス ─── */
    #video-canvas, #annotation-canvas {
      image-rendering: pixelated;
      display: block; max-width: 100%; max-height: 100%;
      object-fit: contain;
    }
    #video-wrap {
      flex: 1; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: #000;
    }

    /* ─── アノテーションキャンバス ─── */
    #annotation-wrap {
      position: relative; flex: 1; overflow: hidden;
      background: #111; display: flex; align-items: center; justify-content: center;
    }
    /* 単一キャンバス — image-rendering でピクセルをシャープに */
    #anno-canvas {
      display: block; cursor: crosshair;
      image-rendering: pixelated;
    }
    /* 旧来の2キャンバス構成は廃止。以下は互換性のため残す */
    #annotation-canvas { cursor: crosshair; }
    #anno-overlay {
      position: absolute; top: 0; left: 0; pointer-events: none;
    }

    /* ─── トレーニングプログレス ─── */
    .train-log {
      font-family: monospace; font-size: 0.78rem;
      background: #0d1117; color: #c9d1d9;
      height: 200px; overflow-y: auto;
      padding: 0.5rem; border-radius: 4px;
      border: 1px solid #30363d;
    }

    /* ─── チェーンステップ ─── */
    .chain-step {
      border: 1px solid var(--bs-border-color);
      border-radius: 6px; padding: 0.5rem; margin-bottom: 0.4rem;
    }
    .chain-step.active  { border-color: #0d6efd; background: rgba(13,110,253,0.08); }
    .chain-step.ok      { border-color: #198754; background: rgba(25,135,84,0.08); }
    .chain-step.error   { border-color: #dc3545; background: rgba(220,53,69,0.12); }
    .chain-step.waiting { border-color: #ffc107; background: rgba(255,193,7,0.08); }

    /* ─── ネイティブ select を非表示にする ─── */
    /* Qt WebEngine は <select> クリック時に OS ネイティブポップアップを
       描画し、その際ページレイアウトを白い背景で無限に拡張するバグがある。
       下の JS ポリフィルが純粋 HTML ドロップダウン (.cs-*) に置換するため
       ネイティブ select 自体は非表示にする。 */
    select.form-select,
    select.form-select-sm {
      display: none !important;
    }

    /* ─── カスタムセレクト (.cs-*) ─── */
    .cs-wrap {
      position: relative; display: block; min-width: 0;
    }
    .cs-btn {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; height: 2.15rem;
      padding: 0.25rem 0.5rem;
      font-size: 0.875rem; font-family: inherit; line-height: 1.5;
      color: var(--bs-body-color);
      background-color: var(--bs-body-bg);
      border: 1px solid var(--bs-border-color);
      border-radius: var(--bs-border-radius-sm, 0.25rem);
      cursor: pointer; text-align: left; box-sizing: border-box;
      transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
    }
    .cs-btn:focus {
      outline: none; border-color: #86b7fe;
      box-shadow: 0 0 0 0.25rem rgba(13,110,253,.25);
    }
    .cs-btn-text {
      flex: 1; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; min-width: 0;
    }
    .cs-btn-caret {
      flex-shrink: 0; margin-left: 0.35rem;
      font-size: 0.6rem; opacity: 0.55;
    }
    .cs-menu {
      position: absolute; z-index: 1055; left: 0; top: 100%;
      min-width: 100%; max-height: 200px; overflow-y: auto;
      background-color: var(--bs-dropdown-bg, #2b2b2b);
      border: 1px solid var(--bs-border-color);
      border-radius: var(--bs-border-radius-sm, 0.25rem);
      box-shadow: 0 4px 12px rgba(0,0,0,.45);
      display: none;
    }
    .cs-menu.show { display: block; }
    .cs-opt {
      padding: 0.25rem 0.75rem; font-size: 0.875rem;
      color: var(--bs-body-color);
      cursor: pointer; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; user-select: none;
    }
    .cs-opt:hover    { background-color: rgba(255,255,255,.08); }
    .cs-opt.cs-active { background-color: var(--bs-primary,#0d6efd); color:#fff; }

    /* ─── スクロールバー細め ─── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
  </style>

  {% block head_extra %}{% endblock %}
</head>
<body>

<!-- ナビゲーションバー -->
<nav class="navbar navbar-dark bg-dark border-bottom px-3 py-1" id="main-nav">
  <a class="navbar-brand fw-bold" href="/">
    <i class="bi bi-camera-video-fill text-primary"></i> BILT+YOLO Studio
  </a>

  <!-- ページタブ -->
  <div class="d-flex gap-1">
    <a href="/detection"  class="btn btn-sm {% if request.path == '/detection'  %}btn-primary{% else %}btn-outline-secondary{% endif %}">
      <i class="bi bi-camera"></i> 検出
    </a>
    <a href="/annotation" class="btn btn-sm {% if request.path == '/annotation' %}btn-primary{% else %}btn-outline-secondary{% endif %}">
      <i class="bi bi-pencil-square"></i> アノテーション
    </a>
    <a href="/training"   class="btn btn-sm {% if request.path == '/training'   %}btn-primary{% else %}btn-outline-secondary{% endif %}">
      <i class="bi bi-cpu"></i> トレーニング
    </a>
    <a href="/chain"      class="btn btn-sm {% if request.path == '/chain'      %}btn-primary{% else %}btn-outline-secondary{% endif %}">
      <i class="bi bi-diagram-3"></i> チェーン
    </a>
    <a href="/settings"   class="btn btn-sm {% if request.path == '/settings'   %}btn-primary{% else %}btn-outline-secondary{% endif %}">
      <i class="bi bi-gear"></i> 設定
    </a>
  </div>

  <!-- サービスステータス -->
  <div class="d-flex align-items-center gap-2" id="svc-status">
    <span class="svc-badge svc-wait" id="badge-bilt">BILT …</span>
    <span class="svc-badge svc-wait" id="badge-yolo">YOLO …</span>
  </div>
</nav>

<!-- ページコンテンツ -->
<div id="page-body">
  {% block body %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- ─── カスタムセレクトポリフィル ─────────────────────────────────────────
     Qt WebEngine は <select> クリック時に OS ネイティブポップアップを描画し
     ページレイアウトを白い背景で無限に拡張するバグがある。
     すべての .form-select を純粋 HTML ドロップダウンに置換することで回避する。
     既存 JS は非表示のネイティブ select 経由で引き続き動作する:
       sel.value = x        → patchSetter で label を同期
       sel.selectedIndex = n → patchSetter で label を同期
       sel.innerHTML = ...  → MutationObserver でメニューを再構築
       sel.appendChild(opt) → MutationObserver でメニューを再構築
       sel.dispatchEvent()  → そのまま native select に委譲
-->
<script>
(function () {
  'use strict';

  function CustomSelect(native) {
    var self    = this;
    this.el     = native;
    this.isOpen = false;

    // ── ラッパー ──────────────────────────────────────────
    var wrap = document.createElement('div');
    wrap.className = 'cs-wrap';
    if (native.style.flex) wrap.style.flex = native.style.flex;
    // Bootstrap スペーシングクラス (mb-2, mt-1 など) をコピー
    Array.from(native.classList).forEach(function (c) {
      if (/^m[tbesxy]-/.test(c)) wrap.classList.add(c);
    });

    // ── トグルボタン ──────────────────────────────────────
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cs-btn';
    btn.setAttribute('aria-haspopup', 'listbox');
    btn.setAttribute('aria-expanded', 'false');

    var label = document.createElement('span');
    label.className = 'cs-btn-text';

    var caret = document.createElement('span');
    caret.className = 'cs-btn-caret';
    caret.textContent = '▾';

    btn.appendChild(label);
    btn.appendChild(caret);

    // ── ドロップダウンメニュー ────────────────────────────
    var menu = document.createElement('div');
    menu.className = 'cs-menu';
    menu.setAttribute('role', 'listbox');

    wrap.appendChild(btn);
    wrap.appendChild(menu);

    // ネイティブ select はラッパー内に隠す (CSS で display:none 済み)
    native.parentNode.insertBefore(wrap, native);
    wrap.appendChild(native);

    this.wrap  = wrap;
    this.btn   = btn;
    this.label = label;
    this.menu  = menu;

    // ── イベント ──────────────────────────────────────────
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      self.isOpen ? self._close() : self._open();
    });
    document.addEventListener('click', function () { self._close(); });

    // ── 初期描画 ──────────────────────────────────────────
    this._rebuild();

    // ── オプション変更の監視 ──────────────────────────────
    // sel.innerHTML = '...' / sel.appendChild(opt) に対応
    var obs = new MutationObserver(function () { self._rebuild(); });
    obs.observe(native, { childList: true });

    // ── value / selectedIndex セッターをパッチ ────────────
    // sel.value = 'x' や sel.selectedIndex = n でラベルを更新する
    function patchSetter(prop) {
      var desc = Object.getOwnPropertyDescriptor(HTMLSelectElement.prototype, prop);
      Object.defineProperty(native, prop, {
        get: function ()  { return desc.get.call(native); },
        set: function (v) { desc.set.call(native, v); self._syncLabel(); },
        configurable: true,
      });
    }
    patchSetter('value');
    patchSetter('selectedIndex');
  }

  CustomSelect.prototype._rebuild = function () {
    var self = this;
    var sel  = this.el;
    var menu = this.menu;

    menu.innerHTML = '';
    for (var i = 0; i < sel.options.length; i++) {
      (function (idx) {
        var item = document.createElement('div');
        item.className   = 'cs-opt' + (idx === sel.selectedIndex ? ' cs-active' : '');
        item.textContent = sel.options[idx].text;
        item.setAttribute('role', 'option');
        item.addEventListener('click', function (e) {
          e.stopPropagation();
          sel.selectedIndex = idx;   // パッチ済みセッター → _syncLabel
          self._close();
          sel.dispatchEvent(new Event('change', { bubbles: true }));
        });
        menu.appendChild(item);
      }(i));
    }
    this._syncLabel();
  };

  CustomSelect.prototype._syncLabel = function () {
    var opt = this.el.options[this.el.selectedIndex];
    this.label.textContent = opt ? opt.text : '';
    var items = this.menu.querySelectorAll('.cs-opt');
    var idx   = this.el.selectedIndex;
    for (var i = 0; i < items.length; i++) {
      items[i].classList.toggle('cs-active', i === idx);
    }
  };

  CustomSelect.prototype._open = function () {
    this.isOpen = true;
    this._rebuild();
    this.menu.classList.add('show');
    this.btn.setAttribute('aria-expanded', 'true');
    // ビューポート下端を超える場合は上方向に表示
    var rect = this.btn.getBoundingClientRect();
    if (rect.bottom + 210 > window.innerHeight) {
      this.menu.style.top    = 'auto';
      this.menu.style.bottom = '100%';
    } else {
      this.menu.style.top    = '100%';
      this.menu.style.bottom = 'auto';
    }
    var active = this.menu.querySelector('.cs-active');
    if (active) active.scrollIntoView({ block: 'nearest' });
  };

  CustomSelect.prototype._close = function () {
    this.isOpen = false;
    this.menu.classList.remove('show');
    this.btn.setAttribute('aria-expanded', 'false');
  };

  function initAll() {
    document.querySelectorAll('select.form-select').forEach(function (sel) {
      if (!sel._cs) { sel._cs = new CustomSelect(sel); }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initAll);
  } else {
    initAll();
  }
}());
</script>

<script>
// ─── サービスヘルスポーリング (15秒間隔) ──────────────────────────
// 両サービスへのリクエストを並列実行し待機時間を最小化する。
// data.bilt / data.yolo はオブジェクトなので .status で判定する。
async function pollHealth() {
  try {
    const res  = await fetch("/api/health");
    const data = await res.json();
    const set  = (id, svcData) => {
      const el = document.getElementById(id);
      // svcData はサービスから返ってきたオブジェクト。
      // error キーがあれば NG、status が "healthy"/"ok" なら OK
      const ok = svcData && !svcData.error &&
                 (svcData.status === "healthy" || svcData.status === "ok");
      el.className = "svc-badge " + (ok ? "svc-ok" : "svc-ng");
      el.textContent = id.replace("badge-", "").toUpperCase() + " " + (ok ? "✓" : "✗");
    };
    set("badge-bilt", data.bilt);
    set("badge-yolo", data.yolo);
  } catch { /* ネットワークエラーは無視し次回ポーリング待ち */ }
}
pollHealth();
setInterval(pollHealth, 15000);  // 15秒間隔に緩和（UIへの負荷低減）
</script>

{% block scripts %}{% endblock %}
</body>
</html>
